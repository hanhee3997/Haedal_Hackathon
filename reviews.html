<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ location }} 후기 - 자취파티</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="brand">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 30L32 12L54 30" stroke="currentColor" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M18 27V50H46V27" stroke="currentColor" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="24" y="32" width="6" height="6" fill="currentColor"/>
                    <rect x="34" y="32" width="6" height="6" fill="currentColor"/>
                    <rect x="24" y="42" width="6" height="6" fill="currentColor"/>
                    <rect x="34" y="42" width="6" height="6" fill="currentColor"/>
                </svg>
                <span class="brand-name">자취파티</span>
                <span class="brand-divider"></span>
                <span class="brand-sub">경북대 자취방 후기</span>
            </a>
            <a href="/" style="color: var(--green); font-weight:700; font-size:16px;">← 메인으로</a>
        </div>
    </header>

    <main>
        <div class="container" style="padding: 40px 0;">
            <h2 style="font-size:28px; font-weight:800; margin-bottom:24px;">
                📍 {{ location }} 구역 후기
            </h2>
            {% if reviews %}
                {% for r in reviews %}
                <div class="detail-panel" style="margin-bottom: 20px;">
                    <div class="detail-head">
                        <h3 style="font-size:20px; font-weight:800;">
                            📍 {{ location }} · {{ r.sub }}
                        </h3>
                    </div>
                    <div class="detail-info" style="border-top: 1px solid var(--line);">
                        <div class="detail-list" style="margin-top:0;">
                            <div class="detail-item">
                                <strong>💰 월세</strong>
                                <span>{{ r.price }}</span>
                            </div>
                            <div class="detail-item">
                                <strong>☀️ 채광</strong>
                                <span>{{ r.sun }}</span>
                            </div>
                            <div class="detail-item" style="grid-column: span 2;">
                                <strong>📝 장점 및 단점</strong>
                                <span style="font-size:15px; font-weight:500; color:#54606a;">{{ r.rev }}</span>
                                <a
                                    href="https://docs.google.com/forms/d/e/1FAIpQLSe-ksLGxhcqj48tsub7KlvZezoOGaaaInGMGt6oVIcYUWjKcA/viewform?usp=pp_url&entry.117865970={{ location }} {{ r.sub }}"
                                    target="_blank"
                                    style="
                                        display:inline-block;
                                        padding:6px 12px;
                                        border-radius:10px;
                                        background:#ffeaea;
                                        color:#d33;
                                        font-size:12px;
                                        font-weight:700;
                                        text-decoration:none;
                                        border:1px solid #ffb7b7;
                                    "
                                >
                                    🚨 신고하기
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <p style="text-align:center; color:#aaa; margin-top:60px; font-size:18px;">
                    아직 후기가 없어요 😅
                </p>
            {% endif %}
        </div>
    </main>
</body>
</html>
